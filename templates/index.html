<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Lens - Extract Text from Images</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.2);
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .file-input-wrapper {
            position: relative;
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 3rem 1rem;
            text-align: center;
            transition: border-color 0.3s ease;
            cursor: pointer;
        }

        .file-input-wrapper:hover {
            border-color: var(--primary);
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .image-preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            object-fit: contain;
            margin-bottom: 0.75rem;
            display: none;
        }

        .image-preview.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        .file-name-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            word-break: break-all;
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.5);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .result-container {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            font-family: 'Inter', monospace;
            font-size: 0.95rem;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .result-container.active {
            display: block;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; height: 0; }
            to { opacity: 1; height: auto; }
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>OCR Lens</h1>
            <p>High-fidelity text extraction powered by AI</p>
        </header>

        <div class="card">
            <form action="/upload" method="POST" enctype="multipart/form-data" class="upload-form" id="uploadForm">
                <div class="file-input-wrapper">
                    <span class="upload-icon" id="uploadIcon">📷</span>
                    <img id="imagePreview" class="image-preview" src="" alt="Preview">
                    <span id="fileName" class="file-name-label">Drop an image here or click to browse</span>
                    <input type="file" name="image" id="imageInput" accept="image/*" required onchange="updatePreview()">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Analyze Image</button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing image...</p>
            </div>

            <div id="result" class="result-container"></div>
        </div>
    </div>

    <script>
        function updatePreview() {
            const input = document.getElementById('imageInput');
            const preview = document.getElementById('imagePreview');
            const icon = document.getElementById('uploadIcon');
            const fileNameDisp = document.getElementById('fileName');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.classList.add('active');
                    icon.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
                fileNameDisp.textContent = input.files[0].name;
            }
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            submitBtn.style.display = 'none';
            loading.style.display = 'block';
            resultDiv.classList.remove('active');

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                resultDiv.textContent = data.text || data.error;
                resultDiv.classList.add('active');
            } catch (error) {
                resultDiv.textContent = "An error occurred during processing.";
                resultDiv.classList.add('active');
            } finally {
                loading.style.display = 'none';
                submitBtn.style.display = 'block';
            }
        };
    </script>
</body>
</html>
